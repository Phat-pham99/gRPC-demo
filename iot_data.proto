syntax = "proto3";

package iot;

service IotService {
  rpc SendTelemetry (TelemetryRequest) returns (TelemetryResponse);
}

message TelemetryRequest {
  string device_id = 1;
  double temperature = 2;
  double humidity = 3;
  int64 timestamp = 4;
  string status_payload = 5; 
}

message TelemetryResponse {
  bool success = 1;
  string message = 2;
}